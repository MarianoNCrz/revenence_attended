<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Generador QR">
<title>Generador de QR — Fiesta</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;padding:1.5rem 1rem;color:#111}
.container{max-width:500px;margin:0 auto}
h1{font-size:20px;font-weight:600;margin-bottom:1.5rem}
.tabs{display:flex;border-bottom:1px solid #ddd;margin-bottom:1.5rem}
.tab{padding:8px 20px;font-size:14px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;color:#888}
.tab.active{color:#111;border-bottom:2px solid #111;font-weight:500}
.panel{display:none}.panel.active{display:block}
label{font-size:13px;color:#666;display:block;margin-bottom:6px}
textarea,input[type=text],input[type=number]{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;margin-bottom:1rem}
textarea{height:180px;resize:vertical;font-family:monospace;font-size:12px}
.btn-row{display:flex;gap:8px;margin-bottom:1rem}
button{padding:10px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:14px;cursor:pointer}
button:active{background:#f0f0f0}
button.primary{background:#111;color:#fff;border-color:#111}
#status{font-size:13px;color:#666;margin-bottom:1rem;min-height:18px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem}
.qr-card{background:#fff;border:1px solid #eee;border-radius:10px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:6px}
.qr-name{font-size:12px;font-weight:600;text-align:center;line-height:1.3}
.qr-dni{font-size:11px;color:#888;text-align:center}
.qr-dl{font-size:11px;color:#0066cc;border:none;background:none;cursor:pointer;text-decoration:underline;padding:2px 0}
#dl-btn{display:none;width:100%}
.info-box{background:#f0f0f0;border-radius:10px;padding:1rem;font-size:13px;color:#666;line-height:1.6;margin-bottom:1rem}
#single-preview{display:none;flex-direction:column;align-items:center;gap:10px;padding:1.25rem;background:#f8f8f8;border-radius:10px;margin-bottom:1rem}
#single-name-lbl{font-size:15px;font-weight:600}
#single-dni-lbl{font-size:13px;color:#888}
</style>
</head>
<body>
<div class="container">
  <h1>Generador de QR por DNI</h1>
  <div class="tabs">
    <button class="tab active" onclick="showTab('bulk')">Lista completa</button>
    <button class="tab" onclick="showTab('single')">QR individual</button>
  </div>

  <div id="panel-bulk" class="panel active">
    <label>Formato: <code>DNI, Nombre Apellido</code> — una por línea</label>
    <textarea id="list-input" placeholder="33703031, Carla Alderete&#10;32456789, Ana García&#10;28901234, Carlos López"></textarea>
    <div class="btn-row">
      <button class="primary" onclick="generateAll()">Generar QRs</button>
      <button onclick="loadDemo()">Cargar demo</button>
    </div>
    <div id="status"></div>
    <div id="grid"></div>
    <button id="dl-btn" class="primary" onclick="downloadZip()">Descargar todos como PNG (ZIP)</button>
  </div>

  <div id="panel-single" class="panel">
    <div class="info-box">Generá el QR de un invitado para enviarlo por WhatsApp de forma individual.</div>
    <label>Nombre completo</label>
    <input type="text" id="s-name" placeholder="Carla Alderete">
    <label>Número de DNI</label>
    <input type="number" id="s-dni" placeholder="33703031" inputmode="numeric">
    <button class="primary" onclick="generateSingle()" style="width:100%;margin-bottom:1rem">Generar QR</button>
    <div id="single-preview">
      <canvas id="single-canvas"></canvas>
      <div id="single-name-lbl"></div>
      <div id="single-dni-lbl"></div>
      <button class="primary" onclick="downloadSingle()" style="width:100%">Descargar PNG</button>
    </div>
  </div>
</div>

// ── ZIP simple (sin dependencia externa) ────────────────────────────────────
// Genera un ZIP válido con archivos PNG usando solo JS puro
function buildZip(files){
  function crc32(buf){var c=0xFFFFFFFF;var t=[];for(var i=0;i<256;i++){var n=i;for(var j=0;j<8;j++)n=n&1?(0xEDB88320^(n>>>1)):(n>>>1);t[i]=n}for(var i=0;i<buf.length;i++)c=t[(c^buf[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0}
  function u32(n){return[n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF]}
  function u16(n){return[n&0xFF,(n>>8)&0xFF]}
  function str2arr(s){var a=[];for(var i=0;i<s.length;i++)a.push(s.charCodeAt(i));return a}
  var localHeaders=[],centralDir=[],offset=0;
  for(var i=0;i<files.length;i++){
    var fname=str2arr(files[i].name);
    var data=files[i].data;
    var crc=crc32(data);
    var lh=[0x50,0x4B,0x03,0x04,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00]
      .concat(u32(crc)).concat(u32(data.length)).concat(u32(data.length))
      .concat(u16(fname.length)).concat([0x00,0x00]).concat(fname);
    var cd=[0x50,0x4B,0x01,0x02,0x14,0x00,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00]
      .concat(u32(crc)).concat(u32(data.length)).concat(u32(data.length))
      .concat(u16(fname.length)).concat([0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00])
      .concat(u32(offset)).concat(fname);
    localHeaders.push(lh,data);
    centralDir.push(cd);
    offset+=lh.length+data.length;
  }
  var cdFlat=[].concat.apply([],centralDir);
  var eocd=[0x50,0x4B,0x05,0x06,0x00,0x00,0x00,0x00]
    .concat(u16(files.length)).concat(u16(files.length))
    .concat(u32(cdFlat.length)).concat(u32(offset))
    .concat([0x00,0x00]);
  var all=[].concat.apply([],[].concat.apply([],localHeaders),cdFlat,eocd);
  all=[].concat.apply([],localHeaders).concat(cdFlat).concat(eocd);
  return new Uint8Array(all);
}

// ── App ──────────────────────────────────────────────────────────────────────
var W=320,H=380,QS=260,QX=30,QY=20;
var generated=[];

function showTab(t){
  document.querySelectorAll('.tab').forEach(function(b,i){b.classList.toggle('active',['bulk','single'][i]===t)});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById('panel-'+t).classList.add('active');
}

function buildCanvas(dni,nombre){
  var cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);
  var qc=QRCodeGen.create(dni,QS);
  ctx.drawImage(qc,QX,QY,QS,QS);
  ctx.fillStyle='#111111';ctx.font='bold 17px sans-serif';ctx.textAlign='center';
  var n=nombre.length>28?nombre.substring(0,27)+'…':nombre;
  ctx.fillText(n,W/2,QY+QS+30);
  ctx.fillStyle='#888888';ctx.font='13px sans-serif';
  ctx.fillText('DNI '+dni,W/2,QY+QS+52);
  return cv;
}

function parseList(txt){
  return txt.trim().split('\n').map(function(l){
    var parts=l.split(',');
    if(parts.length<2)return null;
    var dni=parts[0].trim().replace(/\D/g,'');
    var nombre=parts.slice(1).join(',').trim();
    return(dni&&nombre)?{dni:dni,nombre:nombre}:null;
  }).filter(Boolean);
}

function generateAll(){
  var list=parseList(document.getElementById('list-input').value);
  if(!list.length){document.getElementById('status').textContent='No se encontraron invitados válidos.';return;}
  var grid=document.getElementById('grid');
  var dlBtn=document.getElementById('dl-btn');
  grid.innerHTML='';dlBtn.style.display='none';generated=[];
  document.getElementById('status').textContent='Generando '+list.length+' QRs...';
  var i=0;
  function next(){
    if(i>=list.length){
      document.getElementById('status').textContent=list.length+' QRs listos para descargar.';
      dlBtn.style.display='block';return;
    }
    var item=list[i];
    var cv=buildCanvas(item.dni,item.nombre);
    var card=document.createElement('div');card.className='qr-card';
    var preview=document.createElement('canvas');preview.width=120;preview.height=120;
    preview.getContext('2d').drawImage(cv,QX,QY,QS,QS,0,0,120,120);
    var nameEl=document.createElement('div');nameEl.className='qr-name';nameEl.textContent=item.nombre;
    var dniEl=document.createElement('div');dniEl.className='qr-dni';dniEl.textContent='DNI '+item.dni;
    var dlEl=document.createElement('button');dlEl.className='qr-dl';dlEl.textContent='Descargar';
    (function(c,d,n){dlEl.onclick=function(){triggerDownload(c,d,n)}})(cv,item.dni,item.nombre);
    card.append(preview,nameEl,dniEl,dlEl);
    grid.appendChild(card);
    generated.push({dni:item.dni,nombre:item.nombre,cv:cv});
    document.getElementById('status').textContent=(i+1)+' / '+list.length+' generados...';
    i++;setTimeout(next,10);
  }
  next();
}

function canvasToUint8(cv){
  var dataUrl=cv.toDataURL('image/png');
  var b64=dataUrl.split(',')[1];
  var bin=atob(b64);
  var arr=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return arr;
}

function triggerDownload(cv,dni,nombre){
  var a=document.createElement('a');
  a.href=cv.toDataURL('image/png');
  a.download=dni+'_'+nombre.replace(/\s+/g,'-')+'.png';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function downloadZip(){
  var btn=document.getElementById('dl-btn');
  btn.disabled=true;btn.textContent='Empaquetando...';
  var files=generated.map(function(g){
    return{name:g.dni+'_'+g.nombre.replace(/\s+/g,'-')+'.png',data:canvasToUint8(g.cv)};
  });
  var zip=buildZip(files);
  var blob=new Blob([zip],{type:'application/zip'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='QR-invitados-fiesta.zip';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  btn.disabled=false;btn.textContent='Descargar todos como PNG (ZIP)';
}

function loadDemo(){
  document.getElementById('list-input').value='33703031, Carla Alderete\n32456789, Ana García\n28901234, Carlos López\n35678012, María Rodríguez\n30123456, Juan Pérez';
  generateAll();
}

function generateSingle(){
  var nombre=document.getElementById('s-name').value.trim();
  var dni=document.getElementById('s-dni').value.trim().replace(/\D/g,'');
  if(!nombre||!dni)return;
  var cv=buildCanvas(dni,nombre);
  window._sc={cv:cv,dni:dni,nombre:nombre};
  var preview=document.getElementById('single-canvas');
  preview.width=220;preview.height=260;
  preview.getContext('2d').drawImage(cv,0,0,W,H,0,0,220,260);
  document.getElementById('single-name-lbl').textContent=nombre;
  document.getElementById('single-dni-lbl').textContent='DNI '+dni;
  document.getElementById('single-preview').style.display='flex';
}

function downloadSingle(){
  var s=window._sc;
  if(!s)return;
  triggerDownload(s.cv,s.dni,s.nombre);
}
